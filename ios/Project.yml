name: Northstar
options:
  bundleIdPrefix: dev.northstar
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_NSCameraUsageDescription: "Northstar scans pairing QR codes from your server."
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES

targets:
  Northstar:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Northstar
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.northstar.app
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.0.1"
        TARGETED_DEVICE_FAMILY: "1"        # iPhone only for v1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Northstar/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
