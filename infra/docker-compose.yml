name: northstar

services:
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: northstar/server:dev
    container_name: northstar-server
    restart: unless-stopped
    env_file:
      - ../server/.env
    environment:
      NORTHSTAR_DB_PATH: /data/northstar.db
      NORTHSTAR_LISTEN_ADDR: ":8080"
      NORTHSTAR_FINANCE_SIDECAR_URL: "http://sidecar:9090"
    volumes:
      - northstar-data:/data
    ports:
      - "8080:8080"
    depends_on:
      sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  sidecar:
    build:
      context: ../tools/actual-sidecar
      dockerfile: Dockerfile
    image: northstar/actual-sidecar:dev
    container_name: northstar-sidecar
    restart: unless-stopped
    environment:
      NORTHSTAR_FINANCE_MODE: ${NORTHSTAR_FINANCE_MODE:-mock}
      SIDECAR_HOST: "0.0.0.0"
      SIDECAR_PORT: "9090"
      SIDECAR_SHARED_SECRET: ${NORTHSTAR_FINANCE_SIDECAR_SECRET:-}
    expose:
      - "9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  litestream:
    image: litestream/litestream:0.3.13
    container_name: northstar-litestream
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    env_file:
      - ../server/.env
    volumes:
      - northstar-data:/data:ro
      - ./litestream.yml:/etc/litestream.yml:ro
    command: ["replicate", "-config", "/etc/litestream.yml"]
    profiles:
      - backup   # opt-in: `docker compose --profile backup up` to enable

volumes:
  northstar-data:
    name: northstar-data
