name: iOS

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'

# Lets the user develop primarily on Windows. macOS runners pick up commits
# and build + run the iOS app in a simulator. The MacBook is only needed for
# live debugging.

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Debug, iPhone 15 simulator)
        run: |
          xcodebuild \
            -project Northstar.xcodeproj \
            -scheme Northstar \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath build/ \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || true
          if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi

      # ── TestFlight upload (tagged releases only) ──────────────────────
